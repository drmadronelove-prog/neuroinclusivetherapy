<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Make It Worse!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#2A1E3F; --bg:#FFF0E0;
  --peach:#FFB98E; --coral:#FF8A65; --rose:#FF6B9D;
  --teal:#44CFCB; --gold:#FFE44D; --green:#7FD97F;
  --red:#FF5757; --blue:#6FB3FF; --violet:#7B61FF;
}
html,body{
  width:100%; height:100%;
  background:#1A1028;
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden; user-select:none;
  touch-action:none;
}
#wrap{ position:relative; width:900px; height:600px; max-width:100vw; max-height:100vh; }
#stage{
  width:100%; height:100%;
  border-radius:14px;
  overflow:hidden; position:relative;
  box-shadow: 0 0 80px rgba(255,138,101,.35);
}

.scr{
  position:absolute; inset:0;
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
.scr.on{display:flex;}

/* ========== OPENING ========== */
#s-open{
  background: radial-gradient(ellipse at 50% 30%, #FFB98E 0%, #FF6B9D 50%, #6B2D7A 100%);
  text-align:center; padding:40px;
}
.title{
  font-family:'Bangers',cursive; font-size:74px; color:#FFF;
  letter-spacing:5px; line-height:.95;
  text-shadow: 4px 4px 0 var(--dark), 8px 8px 0 rgba(0,0,0,.2);
  margin-bottom: 26px;
  animation: wob 2.2s ease-in-out infinite;
}
@keyframes wob{50%{transform:rotate(-1.5deg) scale(1.02);}}
.sub{
  font-size:16px; font-weight:700; color:#FFF;
  max-width: 560px; line-height:1.65; margin-bottom:34px;
  background: rgba(42,30,63,.45); padding:20px 30px; border-radius:16px;
  border: 3px solid rgba(255,255,255,.22);
}
.sub b{color:var(--gold); font-style:italic;}
.btn-big{
  font-family:'Bangers',cursive; font-size:34px; letter-spacing:3px;
  background: var(--gold); color: var(--dark); border:none;
  padding:17px 52px; border-radius:50px; cursor:pointer;
  box-shadow: 0 7px 0 #B8A320, 0 10px 26px rgba(255,228,77,.45);
  transition: transform .1s, box-shadow .1s;
  animation: bbounce 2s ease-in-out infinite;
}
@keyframes bbounce{50%{transform:translateY(-5px);}}
.btn-big:hover{transform:translateY(-3px);}
.btn-big:active{transform:translateY(5px); box-shadow: 0 2px 0 #B8A320;}

/* ========== ROOM ========== */
#room{ position:absolute; inset:0; display:none; }
#room.on{display:block;}
#room.r1{ background: linear-gradient(180deg, #FFD4A8 0%, #FFB98E 55%, #FF8A65 100%); }
#room.r2{ background: linear-gradient(180deg, #FFCBD9 0%, #FFA4C2 55%, #E85FA0 100%); }
#room.r3{ background: linear-gradient(180deg, #FFE8A8 0%, #FFD47A 55%, #E8A44A 100%); }
#room.r4{ background: linear-gradient(180deg, #D4F4E8 0%, #9AD8C8 55%, #5CA890 100%); }
#room.r5{ background: linear-gradient(180deg, #EEE0F8 0%, #C8A8E8 55%, #8B6AC0 100%); }

.floor{
  position:absolute; left:0; right:0; bottom:0; height:50%;
  background: linear-gradient(180deg, #C68A5C 0%, #7A4A28 100%);
  clip-path: polygon(0 100%, 100% 100%, 85% 0, 15% 0);
  border-top: 4px solid var(--dark);
}
.floor::after{
  content:''; position:absolute; left:15%; right:15%; top:0; height:2px;
  background: rgba(42,30,63,.3);
}
.wall-art{
  position:absolute; top:58px; left:70px; width:84px; height:104px;
  background: linear-gradient(135deg, var(--gold), var(--coral));
  border: 5px solid var(--dark); border-radius:6px;
  transform: rotate(-3deg);
  display:flex; align-items:center; justify-content:center;
  font-size:44px; color:var(--red);
}
.wall-art.r2{ background: linear-gradient(135deg, var(--teal), var(--violet)); color:#FFE44D; }
.wall-art.r3{ background: linear-gradient(135deg, var(--green), var(--teal)); color:#FFF; }
.wall-art.r4{ background: linear-gradient(135deg, var(--rose), var(--violet)); color:var(--gold); }
.wall-art.r5{ background: linear-gradient(135deg, var(--peach), var(--gold)); color:var(--violet); }
.lamp{
  position:absolute; top:0; right:110px; width:70px; height:28px;
  background: var(--gold); border-radius: 0 0 36px 36px;
  border: 4px solid var(--dark);
  box-shadow: 0 28px 46px rgba(255,228,77,.45);
}
.plant{
  position:absolute; bottom:42%; right:40px;
  width:48px; height:64px;
}
.plant svg{width:100%;height:100%;}

/* ========== HUD ========== */
.hud{
  position:absolute; top:14px; left:14px; right:14px;
  display:flex; justify-content:space-between; align-items:center;
  z-index:100; pointer-events:none;
}
.hud-chip{
  background: rgba(42,30,63,.88); color:#fff;
  padding: 10px 16px; border-radius:14px;
  font-weight:900; font-size:12px; letter-spacing:1.5px;
  border: 3px solid rgba(255,255,255,.25);
  display:flex; gap:10px; align-items:center;
}
.hud-chip.comfort{border-color:var(--green);}
.hud-chip.stress{border-color:var(--red);}
.dots{display:flex; gap:5px;}
.dot{
  width:16px; height:16px; border-radius:50%;
  background: rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.35);
  transition: all .3s;
}
.dot.lit.comfort{ background:var(--green); border-color:#fff; box-shadow: 0 0 14px var(--green); }
.dot.lit.stress{ background:var(--red); border-color:#fff; box-shadow: 0 0 14px var(--red); }
.room-label{
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  font-family:'Bangers',cursive; font-size:24px; letter-spacing:3px;
  color:#fff; text-shadow: 3px 3px 0 rgba(42,30,63,.6);
  pointer-events:none; z-index:100;
}

/* ========== CHARACTER ========== */
.char{
  position:absolute; left:50%; bottom: 40%;
  transform: translateX(-50%);
  width: 200px; height: 280px;
  z-index: 6;
  pointer-events: none;
}
.char svg{width:100%; height:100%;}
.char.breath{ animation: breathe 3s ease-in-out infinite; }
@keyframes breathe{50%{transform: translateX(-50%) translateY(-4px);}}
.char.shake{animation: sob .4s ease-in-out infinite;}
@keyframes sob{
  0%,100%{transform:translateX(-50%);}
  25%{transform:translate(calc(-50% - 5px),-2px);}
  75%{transform:translate(calc(-50% + 5px),-2px);}
}
.char.pop{ animation: happyPop .7s ease-out; }
@keyframes happyPop{
  0%{transform: translateX(-50%) scale(1);}
  40%{transform: translateX(-50%) scale(1.08) translateY(-20px);}
  100%{transform: translateX(-50%) scale(1) translateY(0);}
}
/* Tear visibility by intensity */
.tear{opacity:0;}
.char.i1 .t1, .char.i1 .t2{opacity:.85; animation: teardrip 1.8s linear infinite;}
.char.i2 .t1, .char.i2 .t2, .char.i2 .t3, .char.i2 .t4{opacity:.85; animation: teardrip 1.5s linear infinite;}
.char.i2 .t3, .char.i2 .t4{animation-delay: .6s;}
.char.i3 .tear{opacity:.9; animation: teardrip 1s linear infinite;}
.char.i3 .t3, .char.i3 .t4{animation-delay: .35s;}
.char.i3 .t5, .char.i3 .t6{animation-delay: .7s;}
/* Sadder characters (rounds 3 and 4) cry harder by default */
.char.sadder:not(.i0) .tear{opacity:.88; animation: teardrip 1.2s linear infinite;}
.char.sadder:not(.i0) .t2{animation-delay: .15s;}
.char.sadder:not(.i0) .t3{animation-delay: .35s;}
.char.sadder:not(.i0) .t4{animation-delay: .5s;}
.char.sadder:not(.i0) .t5{animation-delay: .7s;}
.char.sadder:not(.i0) .t6{animation-delay: .85s;}
.char.sadder:not(.i0) .t7{animation-delay: .25s;}
.char.sadder:not(.i0) .t8{animation-delay: .45s;}
.char.sadder:not(.i0) .t9{animation-delay: .6s;}
.char.sadder:not(.i0) .t10{animation-delay: .9s;}
@keyframes teardrip{
  0%{transform: translateY(0) scale(1); opacity:.9;}
  70%{opacity:.8;}
  100%{transform: translateY(44px) scale(.7); opacity:0;}
}
/* Mouth swap */
.mouth-sad{display:block;}
.mouth-happy{display:none;}
.char.i0 .mouth-sad{display:none;}
.char.i0 .mouth-happy{display:block;}

/* Dropzone */
.dropzone{
  position:absolute; left:50%; bottom: 37%;
  transform: translateX(-50%);
  width: 240px; height: 310px;
  z-index: 7;
  border-radius: 50%;
  pointer-events:none;
  transition: all .25s;
}
.dropzone.active{
  background: radial-gradient(ellipse at center, rgba(255,228,77,.25), transparent 70%);
  box-shadow: 0 0 0 6px rgba(255,228,77,.6), 0 0 60px rgba(255,228,77,.5);
}

/* ========== ITEMS ========== */
.items-tray{
  position:absolute; left:0; right:0; bottom:0;
  padding: 14px 16px 16px; 
  display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  background: linear-gradient(180deg, transparent, rgba(42,30,63,.55));
  z-index: 30; pointer-events:none;
}
.item{
  width: 72px; height: 72px;
  background: #FFF; border: 4px solid var(--dark); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:grab; pointer-events:all;
  box-shadow: 0 6px 0 rgba(42,30,63,.5);
  transition: transform .12s, box-shadow .12s, opacity .4s;
  position:relative;
  touch-action:none;
}
.item:hover{transform: translateY(-3px); box-shadow: 0 9px 0 rgba(42,30,63,.5);}
.item:active{cursor:grabbing;}
.item.dragging{
  position:fixed; z-index: 500;
  box-shadow: 0 14px 24px rgba(0,0,0,.5);
  transform: scale(1.2) rotate(4deg);
  pointer-events:none;
  margin:0;
}
.item.used{ opacity:0; transform: scale(.3) rotate(180deg); pointer-events:none; }
.item svg{width:52px; height:52px;}
.item-label{
  position:absolute; bottom: -16px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:900; color:var(--dark);
  background: var(--gold); padding: 2px 7px; border-radius: 7px;
  white-space:nowrap; text-transform:uppercase; letter-spacing:.5px;
  border: 2px solid var(--dark);
}

/* ========== FEEDBACK ========== */
.feedback{
  position:absolute; top: 22%; left:50%; transform:translateX(-50%);
  font-family:'Bangers',cursive; font-size:52px; letter-spacing:4px;
  color: var(--gold);
  text-shadow: 4px 4px 0 var(--dark);
  opacity:0; z-index:250; pointer-events:none;
  text-align:center; white-space:nowrap;
}
.feedback.on{animation: fbpop 1.8s ease-out forwards;}
@keyframes fbpop{
  0%{opacity:0; transform: translate(-50%, 20px) scale(.6);}
  20%{opacity:1; transform: translate(-50%, 0) scale(1.15);}
  80%{opacity:1; transform: translate(-50%, 0) scale(1);}
  100%{opacity:0; transform: translate(-50%, -30px) scale(.95);}
}
.feedback.bad{color: #FFBABA;}

/* Room transition flash */
.flash{
  position:absolute; inset:0; background: #FFF;
  z-index: 400; opacity:0; pointer-events:none;
  transition: opacity .3s;
}
.flash.on{opacity:1;}

/* ========== END ========== */
#s-end{
  background: radial-gradient(ellipse at 50% 35%, #7FD97F 0%, #44CFCB 50%, #2A1E3F 100%);
  text-align:center; padding:40px;
}
#s-end.lose{
  background: radial-gradient(ellipse at 50% 35%, #FFB98E 0%, #7B5A8F 55%, #2A1E3F 100%);
}
.end-t{
  font-family:'Bangers',cursive; font-size:76px; color:#FFF;
  letter-spacing:5px;
  text-shadow: 5px 5px 0 var(--dark);
  margin-bottom:18px;
}
.end-msg{
  font-size:17px; font-weight:700; color:#FFF;
  max-width: 560px; line-height:1.7; margin-bottom:28px;
  background: rgba(42,30,63,.45); padding:22px 30px; border-radius:16px;
  border: 3px solid rgba(255,255,255,.25);
}
.end-msg b{color:var(--gold);}
.end-msg .big-win{
  display:inline-block;
  font-family:'Bangers',cursive;
  font-size:54px; letter-spacing:4px;
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--dark);
  line-height:1.1;
  margin-top:6px;
}
.confetti{position:absolute; pointer-events:none; z-index:600;}
@keyframes cfall{
  0%{transform: translateY(0) rotate(0deg); opacity:1;}
  100%{transform: translateY(640px) rotate(720deg); opacity:0;}
}
/* Dancing items - flank the AGAIN button on both sides */
.dancers-left, .dancers-right{
  position:absolute; bottom:22px;
  display:flex; gap:6px;
  z-index: 550; pointer-events:none;
}
.dancers-left{ left:14px; }
.dancers-right{ right:14px; }
.dancer{
  width:48px; height:48px;
  animation: dance .7s ease-in-out infinite;
  transform-origin: bottom center;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.3));
}
.dancer svg{ width:100%; height:100%; display:block; }
@keyframes dance{
  0%,100%{ transform: translateY(0) rotate(-10deg) scale(1); }
  25%    { transform: translateY(-16px) rotate(6deg) scale(1.12); }
  50%    { transform: translateY(0) rotate(10deg) scale(1); }
  75%    { transform: translateY(-16px) rotate(-6deg) scale(1.12); }
}

</style>
</head>
<body>
<div id="wrap"><div id="stage">

  <!-- OPENING -->
  <div id="s-open" class="scr on">
    <div class="title">DON'T MAKE<br>IT WORSE!</div>
    <div class="sub">
      Someone is crying. They feel bad.<br>
      Your job: <b>don't pile on.</b><br><br>
      Drag comforting things to them. Avoid the stuff that makes it worse.<br>
      Three kind things, they feel better.<br>
      Three stressful things, you made it worse.
    </div>
    <button class="btn-big" onclick="G.start()">HELP!</button>
  </div>

  <!-- ROOM -->
  <div id="room">
    <div class="floor"></div>
    <div class="wall-art" id="wallArt">♥</div>
    <div class="lamp"></div>
    <div class="plant">
      <svg viewBox="0 0 48 64">
        <path d="M24 36 Q10 22 14 8 Q22 18 24 30 Q26 18 34 8 Q38 22 24 36" fill="#4CA84C" stroke="#2A1E3F" stroke-width="2.5"/>
        <rect x="16" y="36" width="16" height="20" fill="#8B4513" stroke="#2A1E3F" stroke-width="2.5" rx="2"/>
      </svg>
    </div>

    <div class="hud">
      <div class="hud-chip comfort">
        <span>COMFORT</span>
        <div class="dots" id="d-c"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div class="hud-chip stress">
        <div class="dots" id="d-s"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>STRESS</span>
      </div>
    </div>
    <div class="room-label" id="roomLabel">ROOM 1</div>

    <div class="char breath i2" id="char"></div>
    <div class="dropzone" id="drop"></div>
    <div class="feedback" id="fb"></div>

    <div class="items-tray" id="tray"></div>
  </div>

  <!-- FLASH transition -->
  <div class="flash" id="flash"></div>

  <!-- END -->
  <div id="s-end" class="scr">
    <div class="end-t" id="endTitle">YOU HELPED!</div>
    <div class="end-msg" id="endMsg"></div>
    <button class="btn-big" onclick="G.restart()">AGAIN</button>
  </div>

</div></div>

<script>
// ================================================================
// AUDIO (Web Audio API)
// ================================================================
const Snd = (()=>{
  let ac;
  const ctx = ()=>ac||(ac=new(window.AudioContext||window.webkitAudioContext)());
  const tone = (f,t,dur,vol=.3,del=0)=>{
    const c=ctx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.setValueAtTime(f,c.currentTime+del);
    g.gain.setValueAtTime(0,c.currentTime+del);
    g.gain.linearRampToValueAtTime(vol,c.currentTime+del+.01);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+del+dur);
    o.start(c.currentTime+del);o.stop(c.currentTime+del+dur+.05);
  };
  const noise = (dur,vol=.18,del=0)=>{
    const c=ctx(),n=c.sampleRate*dur,buf=c.createBuffer(1,n,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    const s=c.createBufferSource();s.buffer=buf;
    const g=c.createGain();s.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(vol,c.currentTime+del);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+del+dur);
    s.start(c.currentTime+del);
  };
  const wake = ()=>{const c=ctx();if(c.state==='suspended')c.resume();};
  return {
    wake,
    comfort(){ // warm ascending chime
      wake();
      [523,659,784,1047].forEach((f,i)=>tone(f,'sine',.28,.22,i*.07));
    },
    stress(){ // soft low tone, never harsh
      wake();
      tone(220,'sine',.28,.22);
      tone(165,'sine',.36,.16,.1);
    },
    pickup(){ wake(); tone(440,'sine',.08,.14); tone(660,'sine',.06,.1,.04); },
    drop(){ wake(); tone(330,'sine',.1,.16); },
    win(){
      wake();
      [523,659,784,1047].forEach((f,i)=>tone(f,'sine',.8,.26,i*.05));
      [784,988,1175,1319].forEach((f,i)=>tone(f,'sine',.4,.3,.28+i*.14));
    },
    lose(){
      wake();
      tone(330,'sine',.4,.25);
      tone(247,'sine',.5,.22,.12);
      tone(196,'sine',.7,.2,.3);
    },
    click(){ wake(); tone(600,'sine',.05,.14); },
    whoosh(){ wake(); noise(.3,.12); tone(440,'sine',.2,.1); tone(660,'sine',.2,.1,.1); },
    ignite(){ wake(); [330,440,523,659,784].forEach((f,i)=>tone(f,'sine',.15,.18,i*.05)); }
  };
})();

// ================================================================
// SVG ART
// ================================================================

const ITEM_SVG = {
  blanket: `<svg viewBox="0 0 64 64">
    <rect x="6" y="14" width="52" height="34" rx="5" fill="#B4A0E8" stroke="#2A1E3F" stroke-width="3"/>
    <rect x="6" y="14" width="52" height="8" fill="#9A82D4" stroke="#2A1E3F" stroke-width="3"/>
    <line x1="20" y1="14" x2="20" y2="48" stroke="#2A1E3F" stroke-width="1.5" stroke-dasharray="2,3"/>
    <line x1="32" y1="14" x2="32" y2="48" stroke="#2A1E3F" stroke-width="1.5" stroke-dasharray="2,3"/>
    <line x1="44" y1="14" x2="44" y2="48" stroke="#2A1E3F" stroke-width="1.5" stroke-dasharray="2,3"/>
    <path d="M6 48 L10 54 M14 48 L18 54 M22 48 L26 54 M30 48 L34 54 M38 48 L42 54 M46 48 L50 54 M54 48 L58 54" stroke="#9A82D4" stroke-width="2.5"/>
  </svg>`,
  water: `<svg viewBox="0 0 64 64">
    <path d="M16 10 L16 50 Q16 58 24 58 L40 58 Q48 58 48 50 L48 10 Z" fill="#E0F4FF" stroke="#2A1E3F" stroke-width="3"/>
    <path d="M18 26 L18 50 Q18 56 24 56 L40 56 Q46 56 46 50 L46 26 Z" fill="#6FB3FF"/>
    <path d="M22 30 Q28 28 34 30 Q38 32 42 30" stroke="#fff" stroke-width="2" fill="none" opacity=".7"/>
    <rect x="22" y="14" width="3" height="22" rx="1.5" fill="#fff" opacity=".55"/>
  </svg>`,
  broccoli: `<svg viewBox="0 0 64 64">
    <circle cx="20" cy="20" r="9" fill="#4CA84C" stroke="#2A1E3F" stroke-width="2.5"/>
    <circle cx="32" cy="14" r="10" fill="#5CB85C" stroke="#2A1E3F" stroke-width="2.5"/>
    <circle cx="44" cy="20" r="9" fill="#4CA84C" stroke="#2A1E3F" stroke-width="2.5"/>
    <circle cx="26" cy="28" r="8" fill="#5CB85C" stroke="#2A1E3F" stroke-width="2.5"/>
    <circle cx="40" cy="28" r="8" fill="#4CA84C" stroke="#2A1E3F" stroke-width="2.5"/>
    <rect x="26" y="34" width="12" height="18" fill="#A8C84C" stroke="#2A1E3F" stroke-width="2.5" rx="2"/>
  </svg>`,
  phone: `<svg viewBox="0 0 64 64">
    <rect x="18" y="6" width="28" height="52" rx="5" fill="#2A1E3F" stroke="#2A1E3F" stroke-width="2"/>
    <rect x="20" y="12" width="24" height="38" fill="#44CFCB"/>
    <text x="32" y="38" font-size="20" text-anchor="middle" fill="#FF5757" font-weight="900">♥</text>
    <circle cx="32" cy="54" r="2.5" fill="#777"/>
  </svg>`,
  bed: `<svg viewBox="0 0 64 64">
    <ellipse cx="32" cy="38" rx="26" ry="14" fill="#FFB4D4" stroke="#2A1E3F" stroke-width="3"/>
    <ellipse cx="32" cy="36" rx="20" ry="9" fill="#FFCCE0"/>
    <path d="M22 34 Q32 30 42 34" stroke="#FFB4D4" stroke-width="2" fill="none"/>
    <path d="M20 40 Q32 44 44 40" stroke="#FFB4D4" stroke-width="2" fill="none"/>
    <text x="48" y="20" font-size="14" fill="#6B5B95" font-weight="900">Zz</text>
  </svg>`,
  computer: `<svg viewBox="0 0 64 64">
    <rect x="6" y="16" width="52" height="30" fill="#2A1E3F" stroke="#2A1E3F" stroke-width="2"/>

// ================================================================
// GAME STATE + CONTROLLER
// ================================================================
const ROOMS = [
  { char:'man',    label:'ROOM 1 / 5', rClass:'r1', wallSym:'♥', wallClass:'' },
  { char:'woman',  label:'ROOM 2 / 5', rClass:'r2', wallSym:'☀', wallClass:'r2' },
  { char:'elder',  label:'ROOM 3 / 5', rClass:'r3', wallSym:'✿', wallClass:'r3' },
  { char:'youth',  label:'ROOM 4 / 5', rClass:'r4', wallSym:'★', wallClass:'r4' },
  { char:'granny', label:'ROOM 5 / 5', rClass:'r5', wallSym:'❋', wallClass:'r5' }
];

const COMFORT_MSGS = ['AHHH...','BETTER.','THAT HELPS.','BREATHING EASIER.','SAFE.','FEELS GOOD.'];
const STRESS_MSGS  = ['OOF.','NOT HELPFUL.','PILING ON.','OW.','HARDER NOW.','TOO MUCH.'];

const S = {
  roomIdx: 0,
  comfort: 0,
  stress: 0,
  busy: false
};

const G = {
  start(){
    Snd.wake(); Snd.ignite();
    S.roomIdx = 0; S.comfort = 0; S.stress = 0;
    this.enterRoom();
  },

  enterRoom(){
    const r = ROOMS[S.roomIdx];
    const room = document.getElementById('room');
    room.className = ''; room.classList.add('on', r.rClass);
    // wall art color variant
    const wa = document.getElementById('wallArt');
    wa.className = 'wall-art' + (r.wallClass ? ' ' + r.wallClass : '');
    wa.textContent = r.wallSym;
    document.getElementById('roomLabel').textContent = r.label;
    // hide opening and end screens
    document.getElementById('s-open').classList.remove('on');
    document.getElementById('s-end').classList.remove('on');
    // reset char
    const char = document.getElementById('char');
    char.innerHTML = charSVG(r.char);
    const sad = (r.char === 'elder' || r.char === 'youth' || r.char === 'granny') ? ' sadder' : '';
    char.className = 'char breath i2' + sad;
    // reset counters
    S.comfort = 0; S.stress = 0;
    this.updateDots();
    // build tray
    this.buildTray();
  },

  buildTray(){
    const tray = document.getElementById('tray');
    tray.innerHTML = '';
    // room-specific item pool
    const keys = [...ROOM_ITEMS[S.roomIdx]];
    // shuffle for variety
    for(let i=keys.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [keys[i],keys[j]] = [keys[j],keys[i]];
    }
    keys.forEach(k=>{
      const it = ITEMS[k];
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.key = k;
      el.innerHTML = ITEM_SVG[k] + `<div class="item-label">${it.label}</div>`;
      this.bindDrag(el, k);
      tray.appendChild(el);
    });
  },

  bindDrag(el, key){
    const onDown = (e)=>{
      if(S.busy) return;
      e.preventDefault();
      Snd.pickup();
      const touch = e.touches ? e.touches[0] : e;
      const rect = el.getBoundingClientRect();
      const stage = document.getElementById('stage').getBoundingClientRect();
      const ox = touch.clientX - rect.left;
      const oy = touch.clientY - rect.top;
      el.classList.add('dragging');
      el.style.left = rect.left + 'px';
      el.style.top  = rect.top + 'px';
      el.style.width = rect.width + 'px';
      el.style.height = rect.height + 'px';

      const onMove = (ev)=>{
        ev.preventDefault();
        const t = ev.touches ? ev.touches[0] : ev;
        el.style.left = (t.clientX - ox) + 'px';
        el.style.top  = (t.clientY - oy) + 'px';
        const dz = document.getElementById('drop').getBoundingClientRect();
        const cx = t.clientX, cy = t.clientY;
        // circular hit test
        const dcx = dz.left + dz.width/2, dcy = dz.top + dz.height/2;
        const dx = cx - dcx, dy = cy - dcy;
        const over = (dx*dx)/((dz.width/2)**2) + (dy*dy)/((dz.height/2)**2) < 1;
        document.getElementById('drop').classList.toggle('active', over);
      };

      const onUp = (ev)=>{
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        const dz = document.getElementById('drop');
        const wasOver = dz.classList.contains('active');
        dz.classList.remove('active');
        el.classList.remove('dragging');
        el.style.left = ''; el.style.top = '';
        el.style.width = ''; el.style.height = '';
        if(wasOver){
          G.handleDrop(key, el);
        } else {
          Snd.drop();
        }
      };

      document.addEventListener('pointermove', onMove, {passive:false});
      document.addEventListener('pointerup', onUp);
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onUp);
    };
    el.addEventListener('pointerdown', onDown);
  },

  handleDrop(key, el){
    if(S.busy) return;
    const it = ITEMS[key];
    el.classList.add('used');
    const char = document.getElementById('char');
    if(it.type === 'comfort'){
      S.comfort++;
      Snd.comfort();
      this.showFB(this.randomMsg(COMFORT_MSGS), false);
      char.classList.remove('shake');
      char.classList.add('pop');
      setTimeout(()=>char.classList.remove('pop'), 700);
      // update intensity down
      const newIntensity = Math.max(0, 2 - S.comfort);
      char.classList.remove('i0','i1','i2','i3');
      char.classList.add('i' + newIntensity);
      this.updateDots();
      if(S.comfort >= 3) this.roomWin();
    } else {
      S.stress++;
      Snd.stress();
      this.showFB(this.randomMsg(STRESS_MSGS), true);
      char.classList.add('shake');
      setTimeout(()=>char.classList.remove('shake'), 500);
      // update intensity up
      const newIntensity = Math.min(3, 2 + S.stress - S.comfort);
      char.classList.remove('i0','i1','i2','i3');
      char.classList.add('i' + Math.max(2, newIntensity));
      this.updateDots();
      if(S.stress >= 3) this.gameOver();
    }
  },

  randomMsg(arr){ return arr[Math.floor(Math.random()*arr.length)]; },

  showFB(text, bad){
    const fb = document.getElementById('fb');
    fb.textContent = text;
    fb.classList.toggle('bad', bad);
    fb.classList.remove('on');
    void fb.offsetWidth;
    fb.classList.add('on');
  },

  updateDots(){
    const dc = document.getElementById('d-c').children;
    const ds = document.getElementById('d-s').children;
    for(let i=0;i<3;i++){
      dc[i].classList.toggle('lit', i < S.comfort);
      dc[i].classList.toggle('comfort', i < S.comfort);
      ds[i].classList.toggle('lit', i < S.stress);
      ds[i].classList.toggle('stress', i < S.stress);
    }
  },

  roomWin(){
    S.busy = true;
    Snd.win();
    setTimeout(()=>{
      if(S.roomIdx < ROOMS.length - 1){
        // advance
        const flash = document.getElementById('flash');
        flash.classList.add('on');
        Snd.whoosh();
        setTimeout(()=>{
          S.roomIdx++;
          S.busy = false;
          this.enterRoom();
          setTimeout(()=>flash.classList.remove('on'), 50);
        }, 450);
      } else {
        // total win
        setTimeout(()=>{ S.busy = false; this.totalWin(); }, 1200);
      }
    }, 1400);
  },

  totalWin(){
    document.getElementById('room').classList.remove('on');
    const end = document.getElementById('s-end');
    end.classList.remove('lose');
    end.classList.add('on');
    document.getElementById('endTitle').textContent = '';
    document.getElementById('endMsg').innerHTML = 
      `Five people feel better because <span class="big-win">YOU HELPED</span><br><br>
       You were kind. You brought soft things. You did not pile on.`;
    Snd.win();
    this.confetti();
  },

  gameOver(){
    S.busy = true;
    Snd.lose();
    setTimeout(()=>{
      S.busy = false;
      document.getElementById('room').classList.remove('on');
      const end = document.getElementById('s-end');
      end.classList.add('on','lose');
      document.getElementById('endTitle').textContent = 'TOO MUCH.';
      document.getElementById('endMsg').innerHTML = 
        `When someone is stressed, <b>more stress doesn't help</b>.<br><br>
         You piled on. Most of us do this without meaning to. We offer busyness, sugar, booze, one more task.<br><br>
         Now you know. Try again with softer hands.`;
    }, 1400);
  },

  restart(){
    document.getElementById('s-end').classList.remove('on','lose');
    document.querySelectorAll('.confetti').forEach(e=>e.remove());
    document.querySelectorAll('.dancers-left, .dancers-right').forEach(e=>e.remove());
    S.roomIdx = 0; S.comfort = 0; S.stress = 0;
    this.enterRoom();
  },

  confetti(){
    const cols = ['#FFE44D','#FF6B9D','#44CFCB','#7FD97F','#FF8A65','#7B61FF','#FFB800','#22C55E'];
    const wrap = document.getElementById('s-end');
    // ENORMOUS confetti burst
    for(let i=0;i<700;i++){
      setTimeout(()=>{
        const el = document.createElement('div');
        el.className = 'confetti';
        const c = cols[Math.floor(Math.random()*cols.length)];
        const sz = 6 + Math.random()*16;
        el.style.cssText = `
          left: ${Math.random()*100}%; top: -18px;
          width: ${sz}px; height: ${sz}px; background: ${c};
          border-radius: ${Math.random()>.5?'50%':'2px'};
          animation: cfall ${1.3+Math.random()*2.4}s ease-in forwards;
        `;
        wrap.appendChild(el);
        setTimeout(()=>el.remove(), 4200);
      }, i*10);
    }
    // Dancing sunlight, knitting, and broccoli flanking the button
    const left = document.createElement('div');
    left.className = 'dancers-left';
    const right = document.createElement('div');
    right.className = 'dancers-right';
    const types = ['sun','knit','broccoli'];
    for(let i=0;i<5;i++){
      const dL = document.createElement('div');
      dL.className = 'dancer';
      dL.innerHTML = ITEM_SVG[types[i%3]];
      dL.style.animationDelay = (i*0.1) + 's';
      left.appendChild(dL);
      const dR = document.createElement('div');
      dR.className = 'dancer';
      dR.innerHTML = ITEM_SVG[types[(i+2)%3]];
      dR.style.animationDelay = (i*0.1 + 0.05) + 's';
      right.appendChild(dR);
    }
    wrap.appendChild(left);
    wrap.appendChild(right);
  }
};
</script>
